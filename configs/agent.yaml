# Agent loop config (inference + verifier + abstention).

model:
  checkpoint: results/stage6_md_cot/checkpoints/best.pt
  llm_id: meta-llama/Llama-3.2-1B
  device: cuda

verifier:
  energy_component: EPtot         # MISATO frames_* key
  # Calibrated at hour 14 from val-set distribution
  train_stats_path: results/stage6_md_cot/train_stats.json

abstention:
  # |z(affinity) - z(independent)| above this -> INCONCLUSIVE
  tau_high: 1.5
  # Always abstain if model says confidence == "low"
  low_confidence_always_abstains: true

bedrock_summarizer:
  enabled: false                   # flip to true at hour 20+ if time permits
  region: us-east-1
  model_id: anthropic.claude-haiku-4-5-20251001-v1:0
