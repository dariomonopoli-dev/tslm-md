server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — future client-side routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets (Vite emits content-hashed filenames)
    location ~* \.(js|css|svg|woff2?|ttf|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Same-origin proxy → inference service
    # The trailing slash on proxy_pass strips /api from the upstream URL.
    location /api/ {
        proxy_pass http://inference:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;     # /evaluate/agent can take ~20-60s
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm;
    gzip_min_length 1024;
}
